    <style>
        /* =========================================================
           DESIGN TOKENS — shared across every page
           ========================================================= */
        :root {
            --bg-deep:    #0A033C;
            --bg-mid:     #0F1B33;
            --accent-violet: #7B2FF7;
            --accent-cyan:   #2AF7FF;
            --accent-coral:  #FF6B6B;
            --text-soft:  #C9D2FF;
            --text-bright: #E6EAF5;
            --glass: rgba(15, 27, 51, 0.55);
            --glass-border: rgba(122, 247, 255, 0.15);
            --radius-lg: 20px;
            --radius-md: 14px;
        }

        * { box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        /* =========================================================
           STATIC FUTURISTIC BACKGROUND
           (previously animated via background-position + floating
           blurred orbs — removed because continuous repaints were
           costing real CPU/GPU, especially on lower-power hardware.
           Static gradient + a themed motherboard illustration gives
           the same atmosphere with zero ongoing render cost.)
           ========================================================= */
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg,
                var(--bg-deep) 0%,
                var(--bg-mid) 30%,
                var(--accent-violet) 70%,
                var(--accent-cyan) 100%);
            font-family: 'Inter', sans-serif;
            color: white;
            overflow-x: hidden;
            position: relative;
        }

        @media (prefers-reduced-motion: reduce) {
            * { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
        }

            background-size: 700px 700px;
            background-repeat: repeat;
            background-attachment: fixed;

        /* =========================================================
           LAYOUT
           ========================================================= */
        .container {
            max-width: 1200px;
            margin-top: 50px;
            margin-bottom: 60px;
            padding: 30px;
            border-radius: 22px;
            background: rgba(10, 3, 60, 0.35);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(42, 247, 255, 0.12);
            box-shadow: 0 0 35px rgba(42, 247, 255, 0.18);
            animation: containerIn 0.5s ease both;
        }

        @keyframes containerIn {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* =========================================================
           SHARED COMPONENTS
           ========================================================= */
        .card {
            background: var(--glass);
            border-radius: var(--radius-lg);
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 0 22px rgba(42, 247, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: white;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }
        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 30px rgba(42, 247, 255, 0.28);
        }

        .ai-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            box-shadow: 0 0 25px rgba(42, 247, 255, 0.2);
            border-radius: var(--radius-lg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        h1, h2, h3, h4, h5, h6 {
            text-shadow: 0 0 10px rgba(42, 247, 255, 0.25);
            font-family: 'Space Grotesk', 'Inter', sans-serif;
        }

        /* Buttons — tech-modern by default, with a soft press/hover lift */
        .btn {
            border-radius: 22px !important;
            font-weight: 600;
            max-width: 400px;
            transition: transform 0.15s ease, box-shadow 0.2s ease, filter 0.2s ease;
        }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.08); }
        .btn:active { transform: translateY(0); }

        .btn-primary {
            background: linear-gradient(90deg, var(--accent-violet), var(--accent-cyan));
            border: none;
            box-shadow: 0 0 15px rgba(42, 247, 255, 0.25);
        }
        .btn-primary:hover {
            box-shadow: 0 0 22px rgba(42, 247, 255, 0.45);
        }

        .btn-outline-dark {
            border: 2px solid var(--accent-cyan);
            color: var(--accent-cyan) !important;
            background: transparent;
        }
        .btn-outline-dark:hover {
            background: var(--accent-cyan);
            color: var(--bg-deep) !important;
        }

        /* Focus states for accessibility — visible cyan ring */
        a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible {
            outline: 2px solid var(--accent-cyan);
            outline-offset: 2px;
        }

        /* Scrollbar theming (webkit) */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: rgba(10,3,60,0.3); }
        ::-webkit-scrollbar-thumb { background: linear-gradient(var(--accent-violet), var(--accent-cyan)); border-radius: 10px; }

        /* =========================================================
           RESPONSIVE
           ========================================================= */
        @media (max-width: 768px) {
            .container {
                margin-top: 20px;
                padding: 18px;
                border-radius: 16px;
            }
            .btn { width: 100% !important; max-width: none; }
        }
    </style>

    {% block extra_head %}{% endblock %}
</head>

<body>

    <div class="ai-circuit-bg"></div>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
